<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="pannellum.css"/>
  <script src="pannellum.js"></script>
  <style>
    html, body, #panorama { 
      width:100%; 
      height:100vh; 
      margin:0; 
    }
  </style>
</head>

<body>
  <div id="panorama"></div>

  <script>
    pannellum.viewer('panorama', {
      default: {
        firstScene: 'scene1',
        sceneFadeDuration: 1000
      },

      scenes: {

        scene1: {
          title: 'Pièce 1',
          panorama: 'panorama.jpg',
          autoLoad: true,
          hotSpotDebug: true,
          hotSpots: [
            {
              pitch: -11,
              yaw: -138,
              type: 'scene',
              sceneId: 'scene2',
              text: 'Aller pièce 2'
            }
          ]
        },

        scene2: {
          title: 'Pièce 2',
          panorama: 'panorama 2.jpg',
          autoLoad: true,
          hotSpotDebug: true,
          hotSpots: [
            {
              pitch: -13,
              yaw: -131,
              type: 'scene',
              sceneId: 'scene1',
              text: 'Retour pièce 1'
            },
            {
              pitch: -20,
              yaw: -100,
              type: 'scene',
              sceneId: 'scene3',
              text: 'Aller pièce 3'
            }
          ]
        },

        scene3: {
          title: 'Pièce 3',
          panorama: 'panorama 3.jpg',
          autoLoad: true,
          hotSpotDebug: true,
          hotSpots: [
            {
              pitch: -20,
              yaw: -100,
              type: 'scene',
              sceneId: 'scene2',
              text: 'Retour pièce 2'
            }
          ]
        }

      }
    });
  </script>
</body>
</html>
